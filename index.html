<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./public/css/style.css">
    <link rel="shortcut icon" href="./public/images/favicon.svg" type="image/x-icon">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">


    <title>HOELLA</title>
</head>

<body>
    <header class="header-container">
        <nav class="main-nav">

            <div class="nav-left">
                <a href="#" aria-label="Open main menu">
                    <svg class="icon-hamburger" aria-hidden="true">
                        <use href="./public/images/icons/sprite.svg#icon-hamburger"></use>
                    </svg>
                </a>

                <a href="#" aria-label="Go to homepage">
                    <img class="logo-small" src="./public/images/favicon.svg" alt="Hoella mobile logo">
                    <img class="logo-large" src="./public/images/logo.svg" alt="Hoella logo">
                </a>
            </div>

            <div class="desktop-menu">
                <a href="#">Design your own</a>
                <a href="#">Shop</a>
                <a href="#">Gifts</a>
            </div>

            <div class="tablet-search-bar">
                <a href="#" aria-label="Submit search">
                    <svg class="icon-search-bar" aria-hidden="true">
                        <use href="./public/images/icons/sprite.svg#icon-search"></use>
                    </svg>
                </a>
                <input class="search-box" type="text" placeholder="Search for custom items..."
                    aria-label="Search for custom items">
            </div>

            <div class="nav-right">
                <div class="desktop-search-bar">
                    <a href="#" aria-label="Submit search">
                        <svg class="desktop-search-icon">
                            <use href="./public/images/icons/sprite.svg#icon-search"></use>
                        </svg>
                    </a>
                    <input class="desktop-search-box" type="text" placeholder="Search for custom items..."
                        aria-label="Search box">
                </div>
                <a href="#" aria-label="Open mobile search">
                    <svg class="icon-search">
                        <use href="./public/images/icons/sprite.svg#icon-search"></use>
                    </svg>
                </a>
                <a href="#" aria-label="Go to your profile">
                    <svg class="icon-profile">
                        <use href="./public/images/icons/sprite.svg#icon-profile"></use>
                    </svg>
                </a>
                <a href="#" aria-label="View shopping cart">
                    <svg class="icon-cart">
                        <use href="./public/images/icons/sprite.svg#icon-cart"></use>
                    </svg>
                </a>
            </div>
        </nav>
    </header>

    <div class="menu-overlay">
        <aside class="sidebar">
            <header class="sidebar-header">
                <a href="#" aria-label="Close sidebar menu">
                    <svg class="sidebar-close" aria-hidden="true">
                        <use href="./public/images/icons/sprite.svg#icon-close"></use>
                    </svg>
                </a>
                <a href="#" aria-label="View shopping cart">
                    <svg class="sidebar-cart" aria-hidden="true">
                        <use href="./public/images/icons/sprite.svg#icon-cart"></use>
                    </svg>
                </a>
            </header>
            <nav class="sidebar-nav">
                <a href="#">Design your own</a>
                <a href="#">Shop</a>
                <a href="#">Gifts</a>

                <a class="sidebar-btn" href="#">
                    start designing
                </a>
            </nav>
            <footer class="sidebar-footer">
                <a href="#" aria-label="Visit our Instagram page">
                    <svg class="social-icon" aria-hidden="true">
                        <use href="./public/images/icons/sprite.svg#icon-instagram"></use>
                    </svg>
                </a>
                <a href="#" aria-label="Visit our TikTok page">
                    <svg class="social-icon" aria-hidden="true">
                        <use href="./public/images/icons/sprite.svg#icon-tiktok"></use>
                    </svg>
                </a>
                <a href="#" aria-label="Visit our YouTube channel">
                    <svg class="social-icon" aria-hidden="true">
                        <use href="./public/images/icons/sprite.svg#icon-youtube"></use>
                    </svg>
                </a>
                <a href="#" aria-label="Visit our Pinterest page">
                    <svg class="social-icon" aria-hidden="true">
                        <use href="./public/images/icons/sprite.svg#icon-pinterest"></use>
                    </svg>
                </a>
            </footer>

        </aside>
    </div>
    <main>
        <section class="hero-section">
            <div class="hero-title">
                <h1>WEAR YOUR <br> CONNECTION</h1>
            </div>

            <div class="hero-features">
                <ul>
                    <li>
                        <svg class="icon-check" aria-hidden="true">
                            <use href="./public/images/icons/sprite.svg#icon-check"></use>
                        </svg>
                        Matching Sets
                    </li>
                    <li>
                        <svg class="icon-check" aria-hidden="true">
                            <use href="./public/images/icons/sprite.svg#icon-check"></use>
                        </svg>
                        Premium Quality
                    </li>
                    <li>
                        <svg class="icon-check" aria-hidden="true">
                            <use href="./public/images/icons/sprite.svg#icon-check"></use>
                        </svg>
                        Easy to Customize
                    </li>
                </ul>
            </div>

            <div class="hero-buttons">
                <a href="#" class="btn-primary btn-base">
                    Shop Collection
                </a>
                <a href="#" class="btn-secondary btn-base">
                    Start Designing
                </a>
            </div>
            <div class="hero-images">
                <div class="img-primary">
                    <div class="hero-backdrop"></div>
                    <img class="hero-card-img" src="./public/images/bandana-dog-logo.svg"
                        alt="Golden retriever wearing a custom orange bandana">
                </div>
                <div class="img-secondary">
                    <div class="hero-backdrop"></div>
                    <img class="hero-card-img" src="./public/images/01-human-logo.svg"
                        alt="The man wearing a custom orange bandana">
                </div>
            </div>


            <div class="hero-trust-badges">
                <ul>
                    <li>
                        <svg class="icon-lock" aria-hidden="true">
                            <use href="./public/images/icons/sprite.svg#icon-lock"></use>
                        </svg>
                        100% Secure Checkout
                    </li>
                    <li class="hero-pipe">|</li>
                    <li>
                        <svg class="icon-star" aria-hidden="true">
                            <use href="./public/images/icons/sprite.svg#icon-star"></use>
                        </svg>
                        Satisfaction Guaranteed
                    </li>
                    <li class="hero-pipe">|</li>
                    <li>
                        <svg class="icon-usa-flag" aria-hidden="true">
                            <use href="./public/images/icons/sprite.svg#icon-usa-flag"></use>
                        </svg>
                        Proudly Printed in Atlanta, GA
                    </li>


                </ul>
            </div>
        </section>
    </main>
</body>

</html>
