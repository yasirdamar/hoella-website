<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./public/css/style.css">
    <link rel="shortcut icon" href="./public/images/favicon.svg" type="image/x-icon">
    <title>HOELLA</title>
</head>

<body>
    <header class="header-container">
        <nav class="main-nav">
            
            <div class="nav-left">
                <a href="#" aria-label="Open main menu">
                    <svg class="icon-hamburger" aria-hidden="true"><use href="./public/images/icons/sprite.svg#icon-hamburger"></use></svg>
                </a>

                <a href="#" aria-label="Go to homepage">
                    <img class="logo-small" src="./public/images/favicon.svg" alt="Hoella mobile logo">
                    <img class="logo-large" src="./public/images/logo.svg" alt="Hoella logo">  
                </a>
            </div>

            <div class="desktop-menu">
                <a href="#">Design your own</a>
                <a href="#">Shop</a>
                <a href="#">Gifts</a>
            </div>

            <div class="tablet-search-bar">
                <a href="#" aria-label="Submit search">
                    <svg class="icon-search-bar" aria-hidden="true"><use href="./public/images/icons/sprite.svg#icon-search"></use></svg>
                </a>
                <input class="search-box"  type="text" placeholder="Search for custom items..." aria-label="Search for custom items">
            </div>

            <div class="nav-right">
                <div class="desktop-search-bar">
                    <a href="#" aria-label="Submit search">
                        <svg class="desktop-search-icon"><use href="./public/images/icons/sprite.svg#icon-search"></use></svg>
                    </a>
                    <input class="desktop-search-box" type="text" placeholder="Search for custom items..." aria-label="Search box">
                </div>
                <a href="#" aria-label="Open mobile search">
                    <svg class="icon-search"><use href="./public/images/icons/sprite.svg#icon-search"></use></svg>
                </a>
                <a href="#" aria-label="Go to your profile">
                    <svg class="icon-profile"><use href="./public/images/icons/sprite.svg#icon-profile"></use></svg>
                </a>
                <a href="#" aria-label="View shopping cart">
                    <svg class="icon-cart"><use href="./public/images/icons/sprite.svg#icon-cart"></use></svg>
                </a>
            </div>
        </nav>
    </header>

    <div class="menu-overlay">
        <aside class="sidebar">
            <header class="sidebar-header">
                <a href="#" aria-label="Close sidebar menu">
                    <svg class="sidebar-close" aria-hidden="true"><use href="./public/images/icons/sprite.svg#icon-close"></use></svg>
                </a>
                <a href="#" aria-label="View shopping cart">
                    <svg class="sidebar-cart" aria-hidden="true"><use href="./public/images/icons/sprite.svg#icon-cart"></use></svg>
                </a>
            </header>
            <nav class="sidebar-nav">
                <a href="#">Design your own</a>
                <a href="#">Shop</a>
                <a href="#">Gifts</a>

                <a class="sidebar-btn" href="#">
                    start designing
                </a>
            </nav>
            <footer class="sidebar-footer">
                <a href="#" aria-label="Visit our Instagram page">
                    <svg class="social-icon" aria-hidden="true"><use href="./public/images/icons/sprite.svg#icon-instagram"></use></svg>
                </a>
                <a href="#" aria-label="Visit our TikTok page">
                    <svg class="social-icon" aria-hidden="true"><use href="./public/images/icons/sprite.svg#icon-tiktok"></use></svg>
                </a>
                <a href="#" aria-label="Visit our YouTube channel">
                    <svg class="social-icon" aria-hidden="true"><use href="./public/images/icons/sprite.svg#icon-youtube"></use></svg>
                </a>
                <a href="#" aria-label="Visit our Pinterest page">
                    <svg class="social-icon" aria-hidden="true"><use href="./public/images/icons/sprite.svg#icon-pinterest"></use></svg>
                </a>
            </footer>

        </aside>
    </div>

</body>

</html>
